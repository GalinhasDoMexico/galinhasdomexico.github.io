<body>
  <script>
    function redirectBasedOnParams() {
  const urlParams = new URLSearchParams(window.location.search);
  const id = urlParams.get('id');
  const lang = urlParams.get('lang');

  const urlMap = {
  Bsky: {
    default: 'https://bsky.app/profile/chickenofmexico.bsky.social'
  },
  Lastfm: {
    default: 'https://last.fm/user/ChickenOfMexico'
  }
};

  if (id && urlMap[id]) {
    const targetUrl = urlMap[id][lang] || urlMap[id].default;
    window.location.href = targetUrl;
  } else {
    console.error('ID inválido ou não encontrado.');
  }
}

redirectBasedOnParams();
  </script>
</body>
</html>
