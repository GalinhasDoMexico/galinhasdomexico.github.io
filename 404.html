<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="title" content="Oh No - Page Not Found (404)">
    <meta name="description" content="Errou em algo ai amigo...">
    <meta name="theme-color" content="#1D0B37">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:site" content="@GalinhasDoMexico">
    <meta name="twitter:creator" content="@ChickenOfMexico">
    <title>Oh No - Page Not Found (404)</title>
    <style>
        body {
            font-family: Roboto;
            text-align: center;
            padding: 50px;
        }

        h1 {
            color: #f00;
        }
    </style>
<script>
// Função para detectar idioma do navegador
function getBrowserLang() {
  let lang = navigator.language || navigator.userLanguage;
  lang = lang.split('-')[0]; // Pega apenas o código de idioma
  return lang;
}

// Lista de URLs válidas
const validUrls = ["about-me", "projects/minecraft", "projects/design-2d", "projects/scripts", "link/youtube"];

// Mapeamento de redirecionamento com base no idioma
const languageRedirects = {
  'en': '/us',
  'pt': '/br',
};

// Obter idioma do navegador
const language = getBrowserLang();

// Obter URL atual
const url = window.location.href;

// Construir a URL de redirecionamento
const redirectUrl = languageRedirects[language] + '/' + url.split('/')[3]; // Redirecionar para a página específica no idioma

// Redirecionar se a URL for válida
if (validUrls.includes(url.split('/')[3])) {
  window.location.replace(redirectUrl);
}
</script>
</head>
<body>
    <h1>404 - Page Not Found</h1>
    <p>Sorry, the page you are looking for might be in another castle.</p>
</body>
</html>
