        body {

            padding: 50px;

            color: #f00;

<script>
        // Lista de URLs válidas
        const validUrls = [
            "/about-me",
            "/projects/minecraft",
            "/projects/scripts",
            "/projects/design-2d",
            "/link/youtube",
        ];

        // Função para verificar se a URL é válida
        function isValidUrl(url) {
            return validUrls.includes(url);
        }

        // Função para redirecionar com base no idioma do navegador
        function redirectBasedOnLanguage() {
            // Obtém o idioma do navegador do usuário
            const userLanguage = navigator.language || navigator.userLanguage;
            
            // Verifica se a URL solicitada é válida
            if (isValidUrl(window.location.pathname)) {
                // Redireciona para o idioma correspondente
                if (userLanguage.startsWith('pt')) {
                    window.location.href = "/br" + window.location.pathname;
                } else {
                    window.location.href = "/us" + window.location.pathname;
                }
            } else {
                // Redireciona para o index principal se a URL não for válida
                window.location.href = "/";
            }
        }

        // Redireciona para o idioma adequado quando a página é carregada
        document.addEventListener('DOMContentLoaded', function() {
            redirectBasedOnLanguage();
        });
</script>
